<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="hubG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="clientG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="nodeG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="lineL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lineR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; }
    .group-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; fill: #64748b; }
    .card-title { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .card-sub { font-size: 10.5px; fill: #64748b; }
    .hub-title { font-size: 18px; font-weight: 700; fill: #fff; }
    .hub-sub { font-size: 11px; fill: rgba(255,255,255,0.6); }
    .edge-label { font-size: 9px; font-weight: 600; fill: #64748b; letter-spacing: 0.5px; }
    .dot { fill: none; stroke-dasharray: 4 4; stroke-width: 1.5; }
  </style>

  <!-- Background -->
  <rect width="880" height="440" fill="#0c0f1a"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1f35" stroke-width="0.5"/>
  </pattern>
  <rect width="880" height="440" fill="url(#grid)"/>

  <!-- Ambient glow behind hub -->
  <circle cx="440" cy="220" r="120" fill="#6366f1" opacity="0.04"/>
  <circle cx="440" cy="220" r="80" fill="#6366f1" opacity="0.03"/>

  <!-- ─── CLIENT CARDS ─── -->
  <text class="group-label" x="120" y="48">Clients</text>
  <line x1="60" y1="56" x2="180" y2="56" stroke="#1e293b" stroke-width="1"/>

  <!-- Mobile -->
  <g filter="url(#soft)">
    <rect x="40" y="78" width="160" height="72" rx="12" fill="#141829" stroke="#1e2844" stroke-width="1"/>
    <rect x="40" y="78" width="4" height="72" rx="2" fill="url(#clientG)"/>
    <circle cx="72" cy="114" r="16" fill="#0d2818" stroke="#10b981" stroke-width="0.5" opacity="0.6"/>
    <path d="M66,108 h12 a2,2 0 0 1 2,2 v12 a2,2 0 0 1 -2,2 h-12 a2,2 0 0 1 -2,-2 v-12 a2,2 0 0 1 2,-2z M69,106 h6 M72,120 m-1,0 a1,1 0 1,0 2,0 a1,1 0 1,0 -2,0" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
    <text class="card-title" x="96" y="109">Mobile App</text>
    <text class="card-sub" x="96" y="124">iOS &amp; Android</text>
  </g>

  <!-- Terminal -->
  <g filter="url(#soft)">
    <rect x="40" y="168" width="160" height="72" rx="12" fill="#141829" stroke="#1e2844" stroke-width="1"/>
    <rect x="40" y="168" width="4" height="72" rx="2" fill="url(#clientG)"/>
    <circle cx="72" cy="204" r="16" fill="#0d2818" stroke="#10b981" stroke-width="0.5" opacity="0.6"/>
    <path d="M65,198 l6,6 -6,6 M73,210 h8" fill="none" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="card-title" x="96" y="199">Terminal TUI</text>
    <text class="card-sub" x="96" y="214">muxd --remote</text>
  </g>

  <!-- Web -->
  <g filter="url(#soft)">
    <rect x="40" y="258" width="160" height="72" rx="12" fill="#141829" stroke="#1e2844" stroke-width="1"/>
    <rect x="40" y="258" width="4" height="72" rx="2" fill="url(#clientG)"/>
    <circle cx="72" cy="294" r="16" fill="#0d2818" stroke="#10b981" stroke-width="0.5" opacity="0.6"/>
    <circle cx="72" cy="294" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M64,294 h16 M72,286 v16 M64.5,289 a12,12 0 0 1 15,0 M64.5,299 a12,12 0 0 0 15,0" fill="none" stroke="#34d399" stroke-width="1.2" stroke-linecap="round"/>
    <text class="card-title" x="96" y="289">Web Client</text>
    <text class="card-sub" x="96" y="304">Coming Soon</text>
  </g>

  <!-- ─── HUB ─── -->
  <g filter="url(#soft)">
    <rect x="365" y="148" width="150" height="144" rx="20" fill="url(#hubG)"/>
    <text class="hub-title" x="440" y="226" text-anchor="middle">Hub</text>
  </g>

  <!-- ─── NODE CARDS ─── -->
  <text class="group-label" x="720" y="48">Nodes</text>
  <line x1="660" y1="56" x2="780" y2="56" stroke="#1e293b" stroke-width="1"/>

  <!-- Node A -->
  <g filter="url(#soft)">
    <rect x="640" y="78" width="180" height="72" rx="12" fill="#141829" stroke="#1e2844" stroke-width="1"/>
    <rect x="816" y="78" width="4" height="72" rx="2" fill="url(#nodeG)"/>
    <circle cx="672" cy="114" r="16" fill="#291e00" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <rect x="661" y="108" width="22" height="14" rx="2" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="667" y1="106" x2="667" y2="108" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="677" y1="106" x2="677" y2="108" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <text class="card-title" x="696" y="109">Node A</text>
    <text class="card-sub" x="696" y="124">Desktop · Windows</text>
  </g>

  <!-- Node B -->
  <g filter="url(#soft)">
    <rect x="640" y="168" width="180" height="72" rx="12" fill="#141829" stroke="#1e2844" stroke-width="1"/>
    <rect x="816" y="168" width="4" height="72" rx="2" fill="url(#nodeG)"/>
    <circle cx="672" cy="204" r="16" fill="#291e00" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <path d="M660,210 h24 l-3,-16 h-18 z M663,210 v4 h18 v-4" fill="none" stroke="#fbbf24" stroke-width="1.4" stroke-linejoin="round"/>
    <text class="card-title" x="696" y="199">Node B</text>
    <text class="card-sub" x="696" y="214">Laptop · macOS</text>
  </g>

  <!-- Node C -->
  <g filter="url(#soft)">
    <rect x="640" y="258" width="180" height="72" rx="12" fill="#141829" stroke="#1e2844" stroke-width="1"/>
    <rect x="816" y="258" width="4" height="72" rx="2" fill="url(#nodeG)"/>
    <circle cx="672" cy="294" r="16" fill="#291e00" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <rect x="662" y="284" width="20" height="16" rx="2" fill="none" stroke="#fbbf24" stroke-width="1.4"/>
    <line x1="662" y1="290" x2="682" y2="290" stroke="#fbbf24" stroke-width="1"/>
    <line x1="662" y1="294" x2="682" y2="294" stroke="#fbbf24" stroke-width="1"/>
    <text class="card-title" x="696" y="289">Node C</text>
    <text class="card-sub" x="696" y="304">Server · Linux</text>
  </g>

  <!-- ─── CONNECTING LINES ─── -->
  <!-- Client → Hub -->
  <path d="M200,114 C280,114 300,190 365,192" class="dot" stroke="url(#lineL)"/>
  <circle cx="365" cy="192" r="3" fill="#818cf8" opacity="0.5"/>

  <path d="M200,204 C280,204 300,210 365,212" class="dot" stroke="url(#lineL)"/>
  <circle cx="365" cy="212" r="3" fill="#818cf8" opacity="0.5"/>

  <path d="M200,294 C280,294 300,228 365,226" class="dot" stroke="url(#lineL)"/>
  <circle cx="365" cy="226" r="3" fill="#818cf8" opacity="0.5"/>

  <!-- Hub → Nodes -->
  <path d="M515,192 C580,192 600,114 640,114" class="dot" stroke="url(#lineR)"/>
  <circle cx="640" cy="114" r="3" fill="#fbbf24" opacity="0.5"/>

  <path d="M515,212 C580,212 600,204 640,204" class="dot" stroke="url(#lineR)"/>
  <circle cx="640" cy="204" r="3" fill="#fbbf24" opacity="0.5"/>

  <path d="M515,226 C580,226 600,294 640,294" class="dot" stroke="url(#lineR)"/>
  <circle cx="640" cy="294" r="3" fill="#fbbf24" opacity="0.5"/>

  <!-- Edge labels -->
  <rect x="258" y="153" width="52" height="16" rx="8" fill="#1a1f35" stroke="#2a3050" stroke-width="0.5"/>
  <text class="edge-label" x="284" y="164" text-anchor="middle">HTTP</text>

  <rect x="538" y="153" width="52" height="16" rx="8" fill="#1a1f35" stroke="#2a3050" stroke-width="0.5"/>
  <text class="edge-label" x="564" y="164" text-anchor="middle">Proxy</text>

  <!-- Bottom description -->
  <text x="440" y="388" text-anchor="middle" font-size="11" fill="#475569" font-family="SF Pro Display, -apple-system, sans-serif">Clients connect to the Hub · Hub routes requests to Nodes · Nodes run the AI agent</text>

  <circle cx="440" cy="408" r="2" fill="#334155"/>
</svg>
